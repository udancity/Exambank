<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>考點 EXAMPOINT｜國中段考題庫練習平台</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #f8fafc; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    @keyframes fadeIn  { from { opacity:0; transform:translateY(8px)  } to { opacity:1; transform:translateY(0)    } }
    @keyframes popIn   { from { opacity:0; transform:scale(0.96)       } to { opacity:1; transform:scale(1)         } }
    @keyframes slideDown { from { opacity:0; transform:translateY(-8px)} to { opacity:1; transform:translateY(0)    } }
    .fade-in    { animation: fadeIn   0.25s ease-out; }
    .pop-in     { animation: popIn    0.2s  ease-out; }
    .slide-down { animation: slideDown 0.2s ease-out; }
    .filter-btn {
      padding: 5px 14px; border-radius: 999px; font-size: 13px; font-weight: 600;
      border: 1.5px solid #e2e8f0; background: #fff; color: #64748b;
      cursor: pointer; transition: all .15s; white-space: nowrap; user-select: none;
    }
    .filter-btn:hover  { border-color: #1a5d43; color: #1a5d43; }
    .filter-btn.active { background: #1a5d43; color: #fff; border-color: #1a5d43; }
    .filter-btn:disabled { opacity: .35; cursor: not-allowed; }
    .option-btn:focus { outline: 2px solid #1a5d43; outline-offset: 2px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

/* ═══════════════════════════════════════════════════════════════════
   SUPABASE CONFIG  (anon key — 前端唯讀)
   ═══════════════════════════════════════════════════════════════════ */
const SB_URL  = 'https://aozlomhzpvjfkjbjttwr.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFvemxvbWh6cHZqZmtqYmp0dHdyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMzk3MTgsImV4cCI6MjA5MTkxNTcxOH0.l-wRtmPUDfu_R7x1EIyBfmZhBsfJNbUnMi073YOoUTM';

/* Storage base URL：get_public_url 已回傳完整 URL，此處作為 fallback 拼接 */
const SB_STORAGE_BASE = `${SB_URL}/storage/v1/object/public/question-images`;
const imgSrc = url => !url ? null : url.startsWith('http') ? url : `${SB_STORAGE_BASE}/${url}`;

/* 圖片關鍵字（與 upload_exams.py 同步） */
const IMG_KW = /附圖|附表|如圖|如附圖|如附表|下圖|右圖|左圖|上圖|如表|下表|示意圖/;
const needsImg = q => !!(q.has_image || q.is_placeholder || IMG_KW.test(q.text || ''));

/* 安全答案轉 index：A→0 B→1 C→2 D→3；數字1-4兼容；null→-1 */
const ANS_IDX = { A:0, B:1, C:2, D:3 };
const toIdx = a => {
  if (a == null || a === '') return -1;
  const s = String(a).trim().toUpperCase();
  if (ANS_IDX[s] !== undefined) return ANS_IDX[s];
  const n = parseInt(s);
  return (n >= 1 && n <= 4) ? n - 1 : -1;
};

async function sbFetch(filters = {}, limit = 300) {
  const p = new URLSearchParams({
    select: 'id,grade,year,semester,exam_term,subject,text,options,answer,explanation,image_url,has_image,is_placeholder',
    limit:  String(limit),
    order:  'id.asc',
  });
  /* year=null 表示不限學年，不帶此 filter */
  if (filters.grade)     p.append('grade',     `eq.${filters.grade}`);
  if (filters.year)      p.append('year',      `eq.${filters.year}`);
  if (filters.semester)  p.append('semester',  `eq.${filters.semester}`);
  if (filters.exam_term) p.append('exam_term', `eq.${filters.exam_term}`);
  if (filters.subject)   p.append('subject',   `eq.${filters.subject}`);
  const r = await fetch(`${SB_URL}/rest/v1/questions?${p}`, {
    headers: { apikey: SB_ANON, Authorization: `Bearer ${SB_ANON}` }
  });
  if (!r.ok) throw new Error(`Supabase ${r.status}`);
  return r.json();
}

const shuffle = arr => [...arr].sort(() => Math.random() - 0.5);
const LETTERS = ['A','B','C','D'];

/* ─── Icons ──────────────────────────────────────────────────────── */
const Icon = ({ d, size=18, className='' }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
    stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
    className={className}>{d}</svg>
);
const BackIcon    = ({s=16}) => <Icon size={s} d={<><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></>}/>;
const CheckIcon   = ({s=16,c=''}) => <Icon size={s} className={c} d={<path d="M20 6 9 17l-5-5"/>}/>;
const XIcon       = ({s=16,c=''}) => <Icon size={s} className={c} d={<path d="M18 6 6 18M6 6l12 12"/>}/>;
const ClockIcon   = ({s=16}) => <Icon size={s} d={<><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>}/>;
const CircleCheck = ({s=18,c=''}) => <Icon size={s} className={c} d={<><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></>}/>;
const AlertIcon   = ({s=16}) => <Icon size={s} d={<><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>}/>;
const HomeIcon2   = ({s=16}) => <Icon size={s} d={<><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></>}/>;
const RetryIcon   = ({s=16}) => <Icon size={s} d={<><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></>}/>;
const ImageIcon   = ({s=16}) => <Icon size={s} d={<><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></>}/>;

/* ─── QuestionImage：顯示圖片或 placeholder 提示 ─────────────────── */
const QuestionImage = ({ q, compact=false }) => {
  const src = imgSrc(q.image_url);
  if (src) {
    return (
      <img src={src} alt="題目附圖"
        className={`rounded-xl border border-gray-200 object-contain block mx-auto mb-4 ${compact ? 'max-h-48 max-w-xs' : 'w-full max-w-lg'}`}
        onError={e => { e.target.style.display='none'; }}
      />
    );
  }
  if (needsImg(q)) {
    return (
      <div className={`flex items-center gap-2 text-amber-700 bg-amber-50 border border-amber-200 rounded-xl px-4 py-2.5 mb-4 ${compact ? 'text-xs' : 'text-sm'}`}>
        <ImageIcon s={compact?13:15}/> 此題含附圖／附表，圖片尚待補充
      </div>
    );
  }
  return null;
};

/* ─── FilterBar ──────────────────────────────────────────────────── */
const SUBJECTS = ['國文','英文','數學','自然','公民','歷史','地理'];

const FilterBar = ({ fs, toggle }) => (
  <div className="sticky top-0 z-40 bg-white border-b border-gray-200 shadow-sm">
    <div className="max-w-7xl mx-auto px-4 py-2.5 flex flex-wrap items-center gap-x-5 gap-y-2">

      {/* 學年度 */}
      <div className="flex items-center gap-1.5">
        <span className="text-[11px] font-bold text-slate-400 uppercase tracking-wide mr-0.5">學年</span>
        <button className={`filter-btn ${fs.year===null?'active':''}`}
          onClick={() => toggle('year', null)}>不限</button>
        {[113,114].map(y => (
          <button key={y} className={`filter-btn ${fs.year===y?'active':''}`}
            onClick={() => toggle('year', y)}>{y}</button>
        ))}
      </div>

      <div className="w-px h-5 bg-gray-200 hidden sm:block"/>

      {/* 年級 */}
      <div className="flex items-center gap-1.5">
        <span className="text-[11px] font-bold text-slate-400 uppercase tracking-wide mr-0.5">年級</span>
        {[7,8,9].map(g => (
          <button key={g} className={`filter-btn ${fs.grade===g?'active':''}`}
            onClick={() => toggle('grade', g)}>{g}年級</button>
        ))}
      </div>

      <div className="w-px h-5 bg-gray-200 hidden sm:block"/>

      {/* 學期 */}
      <div className="flex items-center gap-1.5">
        <span className="text-[11px] font-bold text-slate-400 uppercase tracking-wide mr-0.5">學期</span>
        {[[1,'上'],[2,'下']].map(([v,l]) => (
          <button key={v} className={`filter-btn ${fs.semester===v?'active':''}`}
            onClick={() => toggle('semester', v)}>{l}學期</button>
        ))}
      </div>

      <div className="w-px h-5 bg-gray-200 hidden sm:block"/>

      {/* 段考 */}
      <div className="flex items-center gap-1.5">
        <span className="text-[11px] font-bold text-slate-400 uppercase tracking-wide mr-0.5">段考</span>
        {[[1,'第一次'],[2,'第二次'],[3,'第三次']].map(([v,l]) => (
          <button key={v} className={`filter-btn ${fs.exam_term===v?'active':''}`}
            onClick={() => toggle('exam_term', v)}>{l}</button>
        ))}
      </div>

      <div className="w-px h-5 bg-gray-200 hidden sm:block"/>

      {/* 科目 */}
      <div className="flex items-center gap-1.5 flex-wrap">
        <span className="text-[11px] font-bold text-slate-400 uppercase tracking-wide mr-0.5">科目</span>
        {SUBJECTS.map(s => (
          <button key={s} className={`filter-btn ${fs.subject===s?'active':''}`}
            onClick={() => toggle('subject', s)}>{s}</button>
        ))}
      </div>

    </div>
  </div>
);

/* ─── Navbar ─────────────────────────────────────────────────────── */
const Navbar = ({ onHome, showBack, quizLabel }) => (
  <nav className="bg-white border-b border-gray-200 px-4 md:px-6 py-3.5 sticky top-0 z-50 shadow-sm">
    <div className="max-w-7xl mx-auto flex justify-between items-center">
      <div className="flex items-center gap-3">
        {showBack && (
          <button onClick={onHome}
            className="flex items-center gap-1.5 text-sm text-slate-500 hover:text-[#1a5d43] transition-colors font-medium mr-1">
            <BackIcon s={15}/> 返回
          </button>
        )}
        <button onClick={onHome} className="text-xl font-bold text-[#1a5d43] tracking-tight">
          考點 EXAMPOINT
        </button>
        {quizLabel && (
          <span className="text-xs bg-green-50 text-[#1a5d43] border border-green-200 px-2.5 py-1 rounded-full font-semibold ml-1">
            {quizLabel}
          </span>
        )}
      </div>
      {!showBack && (
        <div className="flex gap-2">
          <button className="px-4 py-1.5 text-slate-600 text-sm font-medium hover:bg-gray-100 rounded-lg transition-all">登入</button>
          <button className="px-4 py-1.5 bg-[#1a5d43] text-white text-sm font-medium rounded-lg hover:bg-[#144a35] transition-all shadow-sm">註冊</button>
        </div>
      )}
    </div>
  </nav>
);

/* ─── Result Page ─────────────────────────────────────────────────── */
const ResultPage = ({ questions, results, mode, onHome, onRetry }) => {
  const [showWrong, setShowWrong] = useState(true);
  const correct = results.filter(r => r.correct).length;
  const total   = results.length;
  const pct     = Math.round(correct / total * 100);
  const wrong   = results.filter(r => !r.correct);
  const unans   = results.filter(r => r.selected === null).length;

  const [grade, emoji, bg, tc] = pct >= 90 ? ['優秀','🏆','bg-green-50','text-green-600']
    : pct >= 70 ? ['良好','👍','bg-blue-50','text-blue-600']
    : pct >= 60 ? ['及格','✅','bg-amber-50','text-amber-600']
    : ['待加強','📚','bg-red-50','text-red-500'];

  return (
    <div className="min-h-screen bg-gray-50">
      <Navbar onHome={onHome} showBack={false}/>
      <div className="max-w-2xl mx-auto px-4 py-10 fade-in">

        {/* Score */}
        <div className={`${bg} rounded-3xl p-8 text-center border border-gray-100 shadow-sm mb-6`}>
          <div className="text-5xl mb-3">{emoji}</div>
          <div className="text-5xl font-extrabold text-slate-800 mb-1">{pct}%</div>
          <div className={`text-lg font-bold mb-5 ${tc}`}>{grade}</div>
          <div className="flex justify-center gap-10">
            {[['答對',correct,'text-green-500'],['答錯',total-correct-unans,'text-red-400'],
              ...(unans>0?[['未作答',unans,'text-gray-400']]:[]),
              ['總題數',total,'text-slate-600']
            ].map(([l,v,c])=>(
              <div key={l}>
                <div className={`text-3xl font-bold ${c}`}>{v}</div>
                <div className="text-sm text-slate-500 mt-0.5">{l}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Wrong review */}
        {wrong.length > 0 && (
          <div className="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden mb-6">
            <button onClick={()=>setShowWrong(v=>!v)}
              className="w-full px-6 py-4 flex justify-between items-center hover:bg-gray-50 transition-colors">
              <div className="flex items-center gap-2 font-bold text-red-500 text-sm">
                <XIcon s={15}/> 錯題回顧（{wrong.length} 題）
              </div>
              <span className="text-slate-400 text-lg">{showWrong?'▲':'▼'}</span>
            </button>
            {showWrong && (
              <div className="border-t border-gray-100">
                {wrong.map((r,ri)=>{
                  const q = questions.find(q=>q.id===r.id);
                  if (!q) return null;
                  const ci = toIdx(q.answer);
                  return (
                    <div key={r.id} className={`px-6 py-5 ${ri<wrong.length-1?'border-b border-gray-100':''} fade-in`}>
                      <div className="flex gap-2 mb-2">
                        <span className="shrink-0 w-6 h-6 bg-red-100 text-red-600 rounded-full flex items-center justify-center text-xs font-bold">{ri+1}</span>
                        <p className="font-medium text-slate-700 text-sm leading-relaxed">{q.text}</p>
                      </div>
                      <div className="ml-8 mb-2">
                        <QuestionImage q={q} compact/>
                      </div>
                      <div className="space-y-1.5 ml-8">
                        {(q.options||[]).map((opt,idx)=>(
                          <div key={idx} className={`px-3 py-2 rounded-xl flex items-center gap-2.5 text-sm ${
                            ci>=0 && idx===ci ? 'bg-green-50 text-green-700 font-semibold border border-green-200'
                            : idx===r.selected&&r.selected!==null ? 'bg-red-50 text-red-600 border border-red-200'
                            : 'text-slate-400'}`}>
                            <span className={`w-5 h-5 rounded-full flex items-center justify-center text-xs font-bold shrink-0 ${
                              ci>=0&&idx===ci?'bg-green-200 text-green-700':idx===r.selected&&r.selected!==null?'bg-red-200 text-red-600':'bg-gray-100 text-gray-400'}`}>
                              {LETTERS[idx]}
                            </span>
                            <span>{opt}</span>
                            {ci>=0&&idx===ci && <CheckIcon s={13} c="ml-auto text-green-600 shrink-0"/>}
                            {idx===r.selected&&r.selected!==null&&idx!==ci && <XIcon s={13} c="ml-auto text-red-400 shrink-0"/>}
                          </div>
                        ))}
                      </div>
                      {ci < 0 && (
                        <div className="ml-8 mt-1 text-xs text-slate-400">（此題答案資料缺失）</div>
                      )}
                      {q.explanation && (
                        <div className="mt-2 ml-8 text-xs text-amber-800 bg-amber-50 border border-amber-100 rounded-xl px-3 py-2">
                          💡 {q.explanation}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

        <div className="flex gap-3">
          <button onClick={onHome}
            className="flex-1 flex items-center justify-center gap-2 py-3 border-2 border-gray-200 rounded-2xl font-bold text-slate-600 hover:bg-gray-50 text-sm transition-all">
            <HomeIcon2 s={15}/> 返回首頁
          </button>
          <button onClick={onRetry}
            className="flex-1 flex items-center justify-center gap-2 py-3 bg-[#1a5d43] text-white rounded-2xl font-bold hover:bg-[#144a35] text-sm transition-all shadow-md shadow-green-100">
            <RetryIcon s={15}/> 重新練習
          </button>
        </div>
      </div>
    </div>
  );
};

/* ─── PracticePage (隨機測驗 & 考古題) ──────────────────────────── */
const PracticePage = ({ questions, label, onHome, onRetry }) => {
  const [idx, setIdx]     = useState(0);
  const [sel, setSel]     = useState(null);
  const [answered, setAns]= useState(false);
  const [results, setRes] = useState([]);
  const [done, setDone]   = useState(false);

  const q  = questions[idx];
  const ci = toIdx(q.answer);
  const progress = ((idx + (answered?1:0)) / questions.length) * 100;

  const handleSelect = (i) => {
    if (answered) return;
    setSel(i);
    setAns(true);
    setRes(prev => [...prev, { id:q.id, selected:i, correct: ci>=0 && i===ci }]);
  };

  const handleNext = () => {
    if (idx < questions.length - 1) {
      setIdx(i=>i+1); setSel(null); setAns(false);
    } else {
      setDone(true);
    }
  };

  if (done) return (
    <ResultPage questions={questions} results={results} mode="practice"
      onHome={onHome} onRetry={onRetry}/>
  );

  return (
    <div className="min-h-screen bg-gray-50">
      <Navbar onHome={onHome} showBack quizLabel={label}/>
      <div className="max-w-2xl mx-auto px-4 pt-8 pb-16">

        {/* Progress bar */}
        <div className="mb-6">
          <div className="flex justify-between text-sm mb-1.5">
            <span className="text-slate-500 font-medium">{label}</span>
            <span className="text-slate-400"><span className="font-bold text-[#1a5d43]">{idx+1}</span> / {questions.length}</span>
          </div>
          <div className="h-2 bg-gray-200 rounded-full overflow-hidden">
            <div className="h-2 bg-[#1a5d43] rounded-full transition-all duration-500" style={{width:`${progress}%`}}/>
          </div>
        </div>

        {/* Question */}
        <div key={idx} className="bg-white rounded-2xl p-6 md:p-8 shadow-sm border border-gray-100 mb-4 pop-in">
          <div className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">
            {[q.grade&&`${q.grade}年級`, q.subject, q.exam_term&&`第${q.exam_term}次段考`].filter(Boolean).join(' · ')}
          </div>
          <p className="text-slate-800 text-lg font-semibold leading-relaxed mb-4">{q.text}</p>
          <QuestionImage q={q}/>
          <div className="space-y-3">
            {(q.options||[]).map((opt,i)=>{
              let cls = 'option-btn w-full text-left px-5 py-3.5 rounded-xl border-2 flex items-center gap-3 font-medium transition-all ';
              if (!answered) cls += 'border-gray-200 hover:border-[#1a5d43] hover:bg-green-50 cursor-pointer text-slate-700';
              else if (ci>=0 && i===ci)  cls += 'border-green-400 bg-green-50 text-green-800';
              else if (i===sel) cls += 'border-red-300 bg-red-50 text-red-700';
              else              cls += 'border-gray-100 bg-gray-50 text-slate-400 opacity-60';
              return (
                <button key={i} className={cls} onClick={()=>handleSelect(i)}>
                  <span className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold shrink-0 transition-colors ${
                    !answered?'bg-gray-100 text-slate-600'
                    :ci>=0&&i===ci?'bg-green-200 text-green-800'
                    :i===sel?'bg-red-200 text-red-700'
                    :'bg-gray-100 text-gray-400'}`}>{LETTERS[i]}</span>
                  <span>{opt}</span>
                  {answered && ci>=0 && i===ci  && <CheckIcon s={17} c="ml-auto text-green-600 shrink-0"/>}
                  {answered && i===sel && i!==ci && <XIcon s={17} c="ml-auto text-red-500 shrink-0"/>}
                </button>
              );
            })}
          </div>
        </div>

        {/* Result banner */}
        {answered && (
          <div className={`flex items-center gap-3 px-5 py-3.5 rounded-2xl mb-4 fade-in font-semibold text-sm ${
            ci>=0&&sel===ci?'bg-green-100 text-green-800 border border-green-200':'bg-red-50 text-red-700 border border-red-200'}`}>
            {ci>=0&&sel===ci
              ? <><CircleCheck s={18} c="shrink-0"/> 答對了！繼續保持 🎉</>
              : ci>=0
                ? <><XIcon s={16} c="shrink-0"/> 答錯了，正確答案是 <strong>{LETTERS[ci]}. {(q.options||[])[ci]}</strong></>
                : <><AlertIcon s={16} c="shrink-0"/> 此題答案資料缺失，無法判斷正確答案</>
            }
          </div>
        )}

        {/* Explanation */}
        {answered && q.explanation && (
          <div className="bg-amber-50 border border-amber-200 rounded-2xl p-5 mb-6 fade-in">
            <div className="flex items-center gap-2 font-bold text-amber-800 mb-1.5 text-sm">
              <AlertIcon s={15}/> 題目解析
            </div>
            <p className="text-amber-900 text-sm leading-relaxed">{q.explanation}</p>
          </div>
        )}

        {answered && (
          <div className="flex justify-end fade-in">
            <button onClick={handleNext}
              className="px-8 py-3 bg-[#1a5d43] text-white rounded-2xl font-bold hover:bg-[#144a35] text-sm shadow-md shadow-green-100 transition-all">
              {idx < questions.length-1 ? '下一題 →' : '查看結果 →'}
            </button>
          </div>
        )}
      </div>
    </div>
  );
};

/* ─── ExamPage (模擬模式) ─────────────────────────────────────────── */
const ExamPage = ({ questions, label, onHome, onRetry }) => {
  const TOTAL = 80 * 60;
  const [answers, setAns]     = useState({});
  const [timeLeft, setTime]   = useState(TOTAL);
  const [curView, setView]    = useState(0);
  const [submitted, setSub]   = useState(false);
  const [confirm, setConfirm] = useState(false);

  useEffect(() => {
    if (submitted) return;
    const t = setInterval(() => setTime(p => {
      if (p <= 1) { clearInterval(t); setSub(true); return 0; }
      return p-1;
    }), 1000);
    return () => clearInterval(t);
  }, [submitted]);

  const fmt = s => `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  const danger = timeLeft < 300;
  const done   = Object.keys(answers).length;
  const undone = questions.length - done;

  if (submitted) {
    const results = questions.map(q => {
      const ci  = toIdx(q.answer);
      const sel = answers[q.id] !== undefined ? answers[q.id] : null;
      return { id:q.id, selected:sel, correct: ci>=0 && sel===ci };
    });
    return <ResultPage questions={questions} results={results} mode="exam" onHome={onHome} onRetry={onRetry}/>;
  }

  const q = questions[curView];

  return (
    <div className="min-h-screen bg-gray-50">
      {/* Exam Navbar */}
      <nav className="bg-white border-b shadow-sm sticky top-0 z-50">
        <div className="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between gap-4">
          <button onClick={onHome}
            className="text-sm text-slate-500 hover:text-red-500 font-medium flex items-center gap-1.5 transition-colors">
            <BackIcon s={14}/> 離開
          </button>
          <div className={`flex items-center gap-1.5 px-4 py-1.5 rounded-full font-bold text-sm transition-colors ${
            danger?'bg-red-50 text-red-600 border border-red-200':'bg-green-50 text-[#1a5d43] border border-green-200'}`}>
            <ClockIcon s={15}/>{fmt(timeLeft)}
          </div>
          <div className="flex items-center gap-3">
            <span className="text-sm text-slate-400 hidden sm:block">
              已作答 <strong className="text-[#1a5d43]">{done}</strong>/{questions.length}
            </span>
            <button onClick={()=>undone>0?setConfirm(true):setSub(true)}
              className="px-5 py-1.5 bg-[#1a5d43] text-white rounded-xl font-bold text-sm hover:bg-[#144a35] transition-all">
              交卷
            </button>
          </div>
        </div>
      </nav>

      <div className="max-w-6xl mx-auto px-4 py-5 flex gap-5">
        {/* Sidebar */}
        <aside className="hidden md:block w-44 shrink-0">
          <div className="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 sticky top-20">
            <div className="text-xs font-bold text-slate-400 uppercase tracking-wide mb-3">題目導覽</div>
            <div className="grid grid-cols-4 gap-1.5">
              {questions.map((qn,i)=>(
                <button key={qn.id} onClick={()=>setView(i)}
                  className={`w-full aspect-square rounded-lg text-xs font-bold transition-all ${
                    i===curView?'bg-[#1a5d43] text-white'
                    :answers[qn.id]!==undefined?'bg-green-100 text-green-700 border border-green-200'
                    :'bg-gray-100 text-slate-500 hover:bg-gray-200'}`}>
                  {i+1}
                </button>
              ))}
            </div>
            <div className="mt-3 space-y-1 text-xs text-slate-500">
              {[['bg-[#1a5d43]','目前'],['bg-green-100 border border-green-200','已作答'],['bg-gray-100','未作答']].map(([bg,l])=>(
                <div key={l} className="flex items-center gap-1.5">
                  <div className={`w-3.5 h-3.5 rounded ${bg}`}/>  {l}
                </div>
              ))}
            </div>
          </div>
        </aside>

        {/* Main */}
        <div className="flex-1 min-w-0">
          {/* Mobile dot strip */}
          <div className="flex gap-1 mb-4 md:hidden overflow-x-auto no-scrollbar pb-1">
            {questions.map((qn,i)=>(
              <button key={qn.id} onClick={()=>setView(i)}
                className={`shrink-0 w-7 h-7 rounded-md text-xs font-bold transition-all ${
                  i===curView?'bg-[#1a5d43] text-white'
                  :answers[qn.id]!==undefined?'bg-green-100 text-green-700'
                  :'bg-gray-100 text-slate-500'}`}>
                {i+1}
              </button>
            ))}
          </div>

          <div key={curView} className="bg-white rounded-2xl p-6 md:p-8 shadow-sm border border-gray-100 mb-4 pop-in">
            <div className="flex justify-between text-xs text-slate-400 mb-5">
              <span>{[q.grade&&`${q.grade}年級`,q.subject].filter(Boolean).join(' · ')}</span>
              <span>第 {curView+1} 題</span>
            </div>
            <p className="text-slate-800 text-lg font-semibold leading-relaxed mb-4">{q.text}</p>
            <QuestionImage q={q}/>
            <div className="space-y-3">
              {(q.options||[]).map((opt,i)=>(
                <button key={i} onClick={()=>setAns(prev=>({...prev,[q.id]:i}))}
                  className={`option-btn w-full text-left px-5 py-3.5 rounded-xl border-2 flex items-center gap-3 font-medium transition-all ${
                    answers[q.id]===i
                      ?'border-[#1a5d43] bg-green-50 text-[#1a5d43]'
                      :'border-gray-200 hover:border-[#1a5d43] hover:bg-green-50 text-slate-700 cursor-pointer'}`}>
                  <span className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold shrink-0 ${
                    answers[q.id]===i?'bg-[#1a5d43] text-white':'bg-gray-100 text-slate-600'}`}>
                    {LETTERS[i]}
                  </span>
                  <span>{opt}</span>
                  {answers[q.id]===i && <CheckIcon s={15} c="ml-auto text-[#1a5d43] shrink-0"/>}
                </button>
              ))}
            </div>
          </div>

          <div className="flex gap-3">
            <button onClick={()=>setView(v=>Math.max(0,v-1))} disabled={curView===0}
              className="flex-1 md:flex-none px-5 py-2.5 border-2 border-gray-200 rounded-xl font-bold text-slate-600 hover:bg-gray-50 text-sm disabled:opacity-40 disabled:cursor-not-allowed transition-all">
              ← 上一題
            </button>
            <button onClick={()=>setView(v=>Math.min(questions.length-1,v+1))} disabled={curView===questions.length-1}
              className="flex-1 md:flex-none px-5 py-2.5 bg-[#1a5d43] text-white rounded-xl font-bold text-sm hover:bg-[#144a35] disabled:opacity-40 disabled:cursor-not-allowed transition-all">
              下一題 →
            </button>
          </div>
        </div>
      </div>

      {/* Confirm modal */}
      {confirm && (
        <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4 fade-in">
          <div className="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl pop-in text-center">
            <div className="text-4xl mb-3">⚠️</div>
            <h3 className="text-xl font-bold text-slate-800 mb-2">確定要交卷嗎？</h3>
            <p className="text-slate-500 mb-6 text-sm">還有 <strong className="text-red-500">{undone} 題</strong>未作答，交卷後無法修改。</p>
            <div className="flex gap-3">
              <button onClick={()=>setConfirm(false)}
                className="flex-1 py-3 border-2 border-gray-200 rounded-xl font-bold text-slate-600 hover:bg-gray-50 transition-all text-sm">繼續作答</button>
              <button onClick={()=>{setConfirm(false);setSub(true);}}
                className="flex-1 py-3 bg-[#1a5d43] text-white rounded-xl font-bold hover:bg-[#144a35] transition-all text-sm">確認交卷</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

/* ─── HomePage ────────────────────────────────────────────────────── */
const EntryCard = ({ emoji, title, desc, badge, featured, disabled, onClick }) => (
  <button onClick={onClick} disabled={disabled}
    className={`group flex flex-col items-center text-center p-7 rounded-3xl border-2 transition-all duration-300 w-full
      ${featured
        ? 'border-t-4 border-t-[#1a5d43] border-x-gray-100 border-b-gray-100 shadow-lg bg-white'
        : 'border-gray-200 bg-white shadow-sm'}
      ${disabled
        ? 'opacity-40 cursor-not-allowed'
        : 'hover:shadow-xl hover:-translate-y-1 cursor-pointer hover:border-[#1a5d43]'}`}>
    <div className={`text-5xl mb-4 transition-transform duration-300 ${!disabled?'group-hover:scale-110':''}`}>{emoji}</div>
    <h3 className="text-lg font-bold text-slate-800 mb-1.5">{title}</h3>
    <p className="text-sm text-slate-500 leading-relaxed mb-3">{desc}</p>
    {badge && (
      <span className="text-xs font-semibold text-[#1a5d43] bg-green-50 border border-green-200 px-3 py-1 rounded-full">{badge}</span>
    )}
  </button>
);

const HomePage = ({ fs, onStart, loading }) => {
  const canArchive = !!(fs.grade && fs.semester && fs.exam_term && fs.subject);
  const canRandom  = !!fs.subject;
  const canExam    = !!fs.subject;

  const missingForArchive = [
    !fs.grade     && '年級',
    !fs.semester  && '學期',
    !fs.exam_term && '段考',
    !fs.subject   && '科目',
  ].filter(Boolean);

  return (
    <div className="min-h-screen bg-gray-50">
      {/* Hero */}
      <div className="bg-white border-b border-gray-100 pt-10 pb-8 text-center">
        <div className="flex items-center justify-center gap-2 mb-3">
          <span className="text-2xl">🎯</span>
          <h2 className="text-3xl md:text-4xl font-extrabold text-slate-900 tracking-tight">Mastering Every Point.</h2>
        </div>
        <p className="text-slate-500 max-w-lg mx-auto text-base px-4">
          精準掌握每個考點・匯整歷年真題・即時練習體驗
        </p>
        {/* Selected filters summary */}
        {(fs.grade||fs.semester||fs.exam_term||fs.subject) && (
          <div className="flex flex-wrap justify-center gap-2 mt-4 slide-down">
            {fs.year      ? <span className="text-xs bg-slate-100 text-slate-600 px-3 py-1 rounded-full font-medium">{fs.year}學年度</span>
                          : <span className="text-xs bg-slate-100 text-slate-600 px-3 py-1 rounded-full font-medium">全學年</span>}
            {fs.grade     && <span className="text-xs bg-green-100 text-green-700 px-3 py-1 rounded-full font-semibold">{fs.grade}年級</span>}
            {fs.semester  && <span className="text-xs bg-green-100 text-green-700 px-3 py-1 rounded-full font-semibold">{fs.semester===1?'上':'下'}學期</span>}
            {fs.exam_term && <span className="text-xs bg-green-100 text-green-700 px-3 py-1 rounded-full font-semibold">第{fs.exam_term}次段考</span>}
            {fs.subject   && <span className="text-xs bg-[#1a5d43] text-white px-3 py-1 rounded-full font-semibold">{fs.subject}</span>}
          </div>
        )}
      </div>

      {/* Three entry buttons */}
      <main className="max-w-4xl mx-auto px-4 py-12">
        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
          <EntryCard
            emoji="📚" title="考古題練習" featured
            desc="從 Supabase 抓取符合條件的歷屆試題，以列表與做題模式練習。"
            badge={canArchive ? '全部條件已選' : `請選擇：${missingForArchive.join('、')}`}
            disabled={!canArchive}
            onClick={() => onStart('archive')}
          />
          <EntryCard
            emoji="🎲" title="隨機測驗"
            desc="從符合條件的題庫隨機抽取 20 題，直接進入沈浸式做題。"
            badge={canRandom ? `已選 ${fs.subject}` : '請先選擇科目'}
            disabled={!canRandom || loading}
            onClick={() => onStart('random')}
          />
          <EntryCard
            emoji="⏱" title="模擬模式"
            desc="限時 80 分鐘模擬考試，作答完畢後統一顯示成績與錯題檢討。"
            badge={canExam ? `已選 ${fs.subject}` : '請先選擇科目'}
            disabled={!canExam || loading}
            onClick={() => onStart('exam')}
          />
        </div>

        {/* Prompt when nothing selected */}
        {!fs.subject && (
          <div className="mt-10 text-center text-slate-400 text-sm fade-in">
            <div className="text-3xl mb-2">☝️</div>
            請先在上方篩選列選擇科目，即可開始練習。
          </div>
        )}

        {loading && (
          <div className="mt-8 text-center text-[#1a5d43] font-semibold fade-in">
            <div className="inline-block w-5 h-5 border-2 border-[#1a5d43] border-t-transparent rounded-full animate-spin mr-2"/>
            從 Supabase 載入題目中…
          </div>
        )}

        {/* Info banner */}
        <div className="mt-14 bg-slate-900 rounded-[2.5rem] p-10 text-white relative overflow-hidden">
          <div className="relative z-10 flex flex-col md:flex-row items-center justify-between gap-6">
            <div className="space-y-3 max-w-lg">
              <h4 className="text-2xl font-bold">準備好挑戰 {fs.year||114} 學年度了嗎？</h4>
              <p className="text-slate-400">在上方篩選列選擇年級、學期、段考及科目，三種練習模式都已就緒。</p>
              <div className="flex flex-wrap gap-3 pt-2">
                {[['題目解析 100% 覆蓋'],['自動錯題收錄'],['多年級全科目']].map(([t])=>(
                  <div key={t} className="flex items-center gap-1.5 bg-slate-800 px-3 py-1.5 rounded-full border border-slate-700 text-sm">
                    <CircleCheck s={14} c="text-green-400"/> {t}
                  </div>
                ))}
              </div>
            </div>
            <button onClick={()=>canRandom&&onStart('random')} disabled={!canRandom}
              className="bg-white text-slate-900 px-7 py-3.5 rounded-2xl font-bold text-base hover:bg-slate-100 transition-all whitespace-nowrap disabled:opacity-40 disabled:cursor-not-allowed">
              立刻開始練習
            </button>
          </div>
          <div className="absolute top-0 right-0 w-56 h-56 bg-[#1a5d43] opacity-20 blur-[80px] -translate-y-1/2 translate-x-1/2 rounded-full"/>
          <div className="absolute bottom-0 left-0 w-56 h-56 bg-purple-600 opacity-10 blur-[80px] translate-y-1/2 -translate-x-1/2 rounded-full"/>
        </div>
      </main>

      <footer className="bg-white border-t border-gray-100 py-8">
        <div className="max-w-7xl mx-auto px-4 flex flex-col md:flex-row justify-between items-center gap-4 text-sm text-slate-400">
          <span className="font-bold text-[#1a5d43]">EXAMPOINT</span>
          <span>© 2024 國中段考題庫練習平台. All rights reserved.</span>
          <div className="flex gap-6">{['服務條款','隱私權政策','聯繫我們'].map(t=><a key={t} href="#" className="hover:text-slate-700">{t}</a>)}</div>
        </div>
      </footer>
    </div>
  );
};

/* ═══════════════════════════════════════════════════════════════════
   APP ROOT
   ═══════════════════════════════════════════════════════════════════ */
const App = () => {
  const [page, setPage]           = useState('home');
  const [mode, setMode]           = useState(null);
  const [instKey, setInstKey]     = useState(0);
  const [questions, setQuestions] = useState([]);
  const [loading, setLoading]     = useState(false);
  const [error, setError]         = useState(null);

  /* year=null 表示不限學年 */
  const [fs, setFs] = useState({
    grade: null, year: 114, semester: null, exam_term: null, subject: null,
  });

  const toggle = (key, val) =>
    setFs(prev => ({ ...prev, [key]: prev[key] === val ? null : val }));

  const loadQuestions = async (m) => {
    setLoading(true);
    setError(null);
    try {
      let qs = await sbFetch(fs, 300);
      if (!qs || qs.length === 0) {
        setError('此篩選條件下暫無題目，請先使用 upload_exams.py 上傳試題。');
        setLoading(false);
        return;
      }
      if (m === 'random') qs = shuffle(qs).slice(0, 20);
      if (m === 'exam')   qs = shuffle(qs).slice(0, 50);
      setQuestions(qs);
      setMode(m);
      setPage(m === 'exam' ? 'exam' : 'practice');
    } catch (e) {
      setError(`載入失敗：${e.message}`);
    }
    setLoading(false);
  };

  const goHome  = () => { setPage('home'); setError(null); };
  const onRetry = () => { setInstKey(k => k+1); loadQuestions(mode); };

  const quizLabel = mode === 'archive' ? '考古題練習'
    : mode === 'random' ? '隨機測驗'
    : mode === 'exam'   ? '模擬模式' : '';

  if (page === 'practice')
    return <PracticePage key={instKey} questions={questions} label={quizLabel} onHome={goHome} onRetry={onRetry}/>;

  if (page === 'exam')
    return <ExamPage key={instKey} questions={questions} label={quizLabel} onHome={goHome} onRetry={onRetry}/>;

  return (
    <>
      <Navbar onHome={goHome} showBack={false}/>
      <FilterBar fs={fs} toggle={toggle}/>
      {error && (
        <div className="max-w-4xl mx-auto px-4 pt-4">
          <div className="bg-red-50 border border-red-200 text-red-700 rounded-2xl px-5 py-3.5 text-sm flex items-center gap-2 fade-in">
            <AlertIcon s={16}/> {error}
          </div>
        </div>
      )}
      <HomePage fs={fs} onStart={loadQuestions} loading={loading}/>
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
